<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #codemirror-root {
      height: 100%;
      padding: 24px 32px 65px;
      font-size: 16px;
      line-height: 24px;
    }

    .cm-editor {
      height: 100%;
    }

    .cm-scroller {
      overflow: auto;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      font-family: ui-monospace, monospace;
      height: 100%;
      max-height: 100%;
    }

    .cm-content {
      padding: 0;
    }
  </style>
</head>

<body>
  <div id="codemirror-root" data-initial-value="" data-placeholder="Start writing in markdown..."></div>
  <script>__CODEMIRROR_BUNDLE__</script>
</body>

</html>
